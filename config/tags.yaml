# OPENLAB Radar — Taxonomía oficial de tags
# Referencia para el evaluador diario y manual al asignar frontmatter en los briefs.
# Usar únicamente tags de esta lista para garantizar consistencia en grep y Obsidian.

technical:
  - context-engineering
  - token-optimization
  - skill-design
  - agent-architecture
  - multi-agent
  - mcp
  - context-window
  - evaluation
  - tool-use
  - knowledge-management
  - long-running-agents
  - harness-engineering
  - enterprise-ai              # IA aplicada a procesos enterprise
  - knowledge-capture          # captura de conocimiento experto → contexto de agentes
  - financial-analysis         # análisis financiero, due diligence, valoraciones con agentes
  - market-intelligence        # inteligencia de mercado automatizada, radares, observatorios
  - data-integration           # integración de fuentes externas (APIs, registros, web scraping)
  - output-formatting          # generación multi-formato (HTML, PDF, Excel, email corporativo)
  - ai-governance              # gobernanza IA, arquitectura de capas, modelo de decisión

openlab_relevance:
  - commercial-argument      # directamente usable en ventas o propuestas
  - client-delivery          # aplicable a cómo entregamos
  - skill-pattern            # patrón reutilizable en los skills que construimos
  - new-service              # oportunidad de nuevo servicio
  - training-material         # usable en formaciones y workshops de adopción
  - competitive-intel        # inteligencia sobre competidores o alternativas
  - business-case-generation # generación automatizada de business cases o propuestas de valor

signal_type:
  - trend                    # tendencia emergente
  - technical-deep-dive      # análisis técnico profundo
  - case-study               # caso real con métricas
  - opinion                  # perspectiva del creador
  - tutorial                 # guía práctica

entities:
  - anthropic
  - openai
  - google
  - microsoft
  - claude-code
  - langchain
  - cursor
  - n8n
